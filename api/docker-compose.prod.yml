name: ${APP_NAME}

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${APP_NAME}_postgres
    environment:
      POSTGRES_DB: ${PG_DBNAME}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DBNAME}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ${PGDATA_DIR}:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME}_redis
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ${REDISDATA_DIR}:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ${APP_NAME}_api
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      GOCACHE: ${GOCACHE}
      OBSERVABLE: ${OBSERVABLE:-false}
      OBSERVABILITY_STACK_MANAGED_EXTERNALLY: ${OBSERVABILITY_STACK_MANAGED_EXTERNALLY:-false}
      PG_HOST: ${PG_HOST}
      PG_PORT: ${PG_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      LOKI_BASE_URL: ${LOKI_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - api_storage:${STORAGE_ROOT}
      - api_gocache:${GOCACHE}
      - ./tmp/observability/logs:/app/tmp/observability/logs
    restart: unless-stopped

volumes:
  api_storage:
  api_gocache:
